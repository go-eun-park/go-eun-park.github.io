<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goeun Park - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <button id="lang-toggle">KOR</button>
        </div>

        <header class="profile-header">
            <img src="profile.jpg" alt="Profile Picture" class="profile-img">
            <div class="profile-info">
                <h1 id="name"></h1>
                <p id="contact-info"></p>
                <p id="role"></p>
            </div>
        </header>

        <section>
            <h2 id="title-about"></h2>
            <p id="about-text"></p>
        </section>

        <section>
            <h2 id="title-skill"></h2>
            <ul id="skill-list"></ul>
        </section>

        <section>
            <h2 id="title-work"></h2>
            <div id="work-list"></div>
        </section>

        <section>
            <h2 id="title-edu"></h2>
            <div id="education-list"></div>
        </section>

        <section>
            <h2 id="title-pub"></h2>
            <div id="publication-list"></div>
        </section>

        <section>
            <h2 id="title-pat"></h2>
            <div id="patent-list"></div>
        </section>

        <section>
            <h2 id="title-copy"></h2>
            <div id="copyright-list"></div>
        </section>

        <section>
            <h2 id="title-award"></h2>
            <div id="award-list"></div>
        </section>

        <section>
            <h2 id="title-act"></h2>
            <div id="activity-list"></div>
        </section>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
